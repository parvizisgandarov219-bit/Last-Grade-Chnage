<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grade Change System — PP Plant</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100vh}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#e8f0f7,#f0ece8);background-attachment:fixed;color:#1a1a18;font-size:14px}
.topbar{background:rgba(255,255,255,.93);backdrop-filter:blur(10px);border-bottom:1px solid rgba(0,0,0,.08);padding:10px 14px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:99;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.logo{width:34px;height:34px;background:linear-gradient(135deg,#185FA5,#2b7fc4);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:12px;flex-shrink:0}
.navs{display:flex;gap:2px;background:rgba(0,0,0,.06);padding:3px;border-radius:9px;margin-left:auto;overflow-x:auto}
.nb{padding:6px 12px;font-size:12px;border-radius:7px;border:none;background:transparent;font-weight:500;color:#6b6b67;cursor:pointer;white-space:nowrap;font-family:inherit}
.nb.on{background:#fff;font-weight:800;color:#185FA5;box-shadow:0 1px 6px rgba(0,0,0,.1)}
.page{display:none;padding:14px;width:100%}
.page.on{display:block}
.card{background:rgba(255,255,255,.88);border-radius:13px;border:1px solid rgba(255,255,255,.7);padding:14px 18px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.ct{font-weight:800;font-size:12px;color:#777;margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em}
.pbar{height:8px;background:rgba(0,0,0,.07);border-radius:4px;overflow:hidden;margin-bottom:4px}
/* LOGIN */
#login-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#e8f0f7,#f0ece8);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.login-box{background:#fff;border-radius:18px;padding:36px 28px;max-width:380px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.12);text-align:center}
.login-role-btn{padding:18px 10px;border-radius:12px;cursor:pointer;font-family:inherit;border:2px solid transparent;width:100%;background:transparent;transition:background .2s}
/* START */
.start-box{background:rgba(24,95,165,.04);border:1.5px dashed rgba(24,95,165,.3);border-radius:14px;padding:40px 20px;text-align:center;margin-bottom:12px}
.start-icon{width:76px;height:76px;background:linear-gradient(135deg,#185FA5,#2b7fc4);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:30px;color:#fff}
.btn-start{background:linear-gradient(135deg,#185FA5,#2b7fc4);color:#fff;border:none;border-radius:12px;padding:15px 40px;font-weight:900;font-size:16px;cursor:pointer;font-family:inherit;box-shadow:0 6px 18px rgba(24,95,165,.38)}
.done-banner{background:rgba(59,109,17,.06);border:1.5px solid rgba(59,109,17,.28);border-radius:14px;padding:30px 20px;text-align:center;margin-bottom:12px}
.done-icon{width:68px;height:68px;background:linear-gradient(135deg,#3B6D11,#5a9a1a);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:28px;color:#fff}
.el-bar{background:rgba(24,95,165,.07);border:1px solid rgba(24,95,165,.18);border-radius:11px;padding:10px 16px;margin-bottom:12px;display:flex;align-items:center;gap:14px}
.el-val{font-family:monospace;font-weight:900;font-size:20px;color:#185FA5}
/* STEPS */
.stbl{width:100%;border-collapse:collapse}
.stbl tr{border-bottom:1px solid rgba(0,0,0,.06)}
.stbl tr.sd{background:rgba(192,221,151,.1)}
.stbl tr.sa{background:rgba(250,199,117,.09)}
.sn{width:36px;text-align:center;vertical-align:top;padding:11px 4px;font-family:monospace;font-weight:900;font-size:13px;color:#bbb;border-left:4px solid rgba(0,0,0,.08)}
.sc{padding:11px 13px;vertical-align:top}
.stamp{font-size:11px;color:#3B6D11;background:rgba(192,221,151,.35);padding:3px 8px;border-radius:5px;display:inline-block;margin-top:4px}
/* BUTTONS */
.bb{background:linear-gradient(135deg,#185FA5,#2b7fc4);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit}
.bg{background:linear-gradient(135deg,#3B6D11,#5a9a1a);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit}
.bx{background:rgba(0,0,0,.05);color:#6b6b67;border:1px solid rgba(0,0,0,.12);border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.bc{background:rgba(234,243,222,.9);color:#3B6D11;border:1px solid rgba(59,109,17,.28);border-radius:8px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;text-align:center;line-height:1.4}
.bc small{display:block;font-size:10px;color:#4a8a22;font-weight:500}
.bdel{background:rgba(252,235,235,.9);color:#A32D2D;border:1px solid rgba(247,193,193,.7);border-radius:7px;padding:4px 9px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.bedit{background:rgba(230,241,251,.9);color:#185FA5;border:1px solid rgba(24,95,165,.25);border-radius:7px;padding:4px 9px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
/* QUALITY BARS */
.qw{margin-bottom:13px}
.qbar{position:relative;height:10px;background:rgba(0,0,0,.07);border-radius:5px;overflow:hidden;margin-bottom:3px}
.qband{position:absolute;height:100%;background:#C0DD97;opacity:.55}
.qtgt{position:absolute;width:2px;height:100%;background:#3B6D11;opacity:.7}
.qdot{position:absolute;top:-1px;width:12px;height:12px;border-radius:50%;border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.spec-box{background:rgba(255,255,255,.7);border-radius:9px;padding:10px 13px;border-left:4px solid #ddd}
/* SAMPLES */
.sm-tbl{width:100%;font-size:12px;border-collapse:collapse}
.sm-tbl th{padding:4px 6px;color:#777;font-weight:600;border-bottom:1px solid rgba(0,0,0,.08);text-align:right;font-size:11px}
.sm-tbl th:first-child{text-align:left}
.sm-tbl td{padding:5px 6px;border-bottom:1px solid rgba(0,0,0,.05);font-family:monospace}
.sm-tbl td:not(:first-child){text-align:right}
.ok{color:#3B6D11;font-weight:700}.bad{color:#E24B4A;font-weight:700}
.pill{font-size:11px;padding:2px 8px;border-radius:5px;font-weight:700}
.pill.done{background:rgba(192,221,151,.4);color:#3B6D11}
.pill.act{background:rgba(250,199,117,.35);color:#854F0B}
.pill.pend{background:rgba(0,0,0,.05);color:#777}
/* ENGINEER */
.ti{background:rgba(255,255,255,.88);border-radius:11px;border:1px solid rgba(0,0,0,.08);padding:13px 15px;margin-bottom:9px}
.ti.open{border-color:rgba(24,95,165,.3);border-width:1.5px}
.ti-arrow{width:30px;height:30px;border-radius:7px;background:rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0}
.ti.open .ti-arrow{background:linear-gradient(135deg,#185FA5,#2b7fc4);color:#fff}
.eng-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.ep{background:rgba(192,221,151,.12);border:1.5px solid rgba(192,221,151,.5);border-radius:9px;padding:13px;margin:4px 0 8px}
.pb-box{background:rgba(192,221,151,.15);border:1px solid rgba(192,221,151,.4);border-radius:9px;padding:12px;margin-bottom:12px}
/* FORMS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.fld label{display:block;font-size:11px;color:#777;margin-bottom:3px;font-weight:600}
.fld input,.fld select,.fld textarea{width:100%;border:1px solid rgba(0,0,0,.13);border-radius:7px;padding:7px 9px;font-size:13px;font-family:inherit;background:rgba(255,255,255,.85)}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,.1)}
.fld textarea{resize:vertical}
.fx{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sel{border:1px solid rgba(0,0,0,.13);border-radius:8px;padding:6px 10px;font-size:13px;font-family:inherit;background:rgba(255,255,255,.85)}
.mon{font-family:monospace}
.hidden{display:none}
.nt-form{background:rgba(245,243,239,.85);border-radius:11px;padding:16px;margin-bottom:13px;border:1px solid rgba(0,0,0,.08)}
/* WORKBOOKS */
.wb-sec{border:1px solid rgba(0,0,0,.08);border-radius:9px;margin-bottom:7px;overflow:hidden}
.wb-sec-hdr{display:flex;align-items:center;gap:8px;padding:9px 13px;cursor:pointer;background:rgba(0,0,0,.02);user-select:none}
.wb-tbl{width:100%;font-size:12px;border-collapse:collapse;min-width:480px}
.wb-tbl th{text-align:left;padding:5px 7px;color:#777;font-weight:600;font-size:11px;border-bottom:1px solid rgba(0,0,0,.08);background:rgba(0,0,0,.03)}
.wb-tbl td{padding:6px 7px;border-bottom:1px solid rgba(0,0,0,.05)}
@media print{
  body{background:#fff!important}
  .topbar,#login-screen,.bb,.bg,.bx,.bdel,.bedit,.btn-start,#sf,.wb-sec-hdr button{display:none!important}
  .page{display:block!important;padding:0}
  .card{box-shadow:none;border:1px solid #ddd;background:#fff}
}
</style>
  <!-- Firebase Realtime Database SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div style="width:60px;height:60px;background:linear-gradient(135deg,#185FA5,#2b7fc4);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:22px;color:#fff;font-weight:900">GC</div>
    <div style="font-size:21px;font-weight:900;margin-bottom:4px">Grade Change System</div>
    <div style="font-size:13px;color:#777;margin-bottom:26px">PP Plant</div>
    <div class="g2" style="margin-bottom:0">
      <button class="login-role-btn" onclick="showOpLogin()" style="background:rgba(24,95,165,.08);border-color:rgba(24,95,165,.2)">
        <div style="font-size:26px;margin-bottom:6px">&#128084;</div>
        <div style="font-weight:800;font-size:13px;color:#185FA5">Operator</div>
        <div style="font-size:11px;color:#777;margin-top:2px">View &amp; confirm steps</div>
      </button>
      <button class="login-role-btn" onclick="showPELogin()" style="background:rgba(59,109,17,.08);border-color:rgba(59,109,17,.2)">
        <div style="font-size:26px;margin-bottom:6px">&#128736;</div>
        <div style="font-weight:800;font-size:13px;color:#3B6D11">Process Engineer</div>
        <div style="font-size:11px;color:#777;margin-top:2px">Full access + edit</div>
      </button>
    </div>
    <!-- Operator name form -->
    <div id="op-login-form" style="display:none;border-top:1px solid rgba(0,0,0,.08);margin-top:16px;padding-top:16px">
      <div style="font-size:12px;font-weight:700;color:#555;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">Enter your name</div>
      <input id="op-name" type="text" placeholder="e.g. A. Mammadov" onkeydown="if(event.key==='Enter')loginOp()" style="width:100%;border:1px solid rgba(0,0,0,.13);border-radius:9px;padding:10px 14px;font-size:14px;font-family:inherit;margin-bottom:10px">
      <div id="op-err" style="font-size:12px;color:#E24B4A;margin-bottom:8px;display:none">Please enter your name.</div>
      <div class="fx">
        <button onclick="loginOp()" style="flex:1;padding:10px;background:linear-gradient(135deg,#185FA5,#2b7fc4);color:#fff;border:none;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit">Login</button>
        <button onclick="hideOpLogin()" style="padding:10px 14px;background:rgba(0,0,0,.05);color:#555;border:1px solid rgba(0,0,0,.12);border-radius:9px;font-size:13px;cursor:pointer;font-family:inherit">Cancel</button>
      </div>
    </div>
    <!-- PE password form -->
    <div id="pe-login-form" style="display:none;border-top:1px solid rgba(0,0,0,.08);margin-top:16px;padding-top:16px">
      <div style="font-size:12px;font-weight:700;color:#555;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">Process Engineer Password</div>
      <input id="pe-pwd" type="password" placeholder="Password..." onkeydown="if(event.key==='Enter')loginPE()" style="width:100%;border:1px solid rgba(0,0,0,.13);border-radius:9px;padding:10px 14px;font-size:14px;font-family:inherit;margin-bottom:10px">
      <div id="pe-err" style="font-size:12px;color:#E24B4A;margin-bottom:8px;display:none">Incorrect password.</div>
      <div class="fx">
        <button onclick="loginPE()" style="flex:1;padding:10px;background:linear-gradient(135deg,#3B6D11,#5a9a1a);color:#fff;border:none;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit">Login</button>
        <button onclick="hidePELogin()" style="padding:10px 14px;background:rgba(0,0,0,.05);color:#555;border:1px solid rgba(0,0,0,.12);border-radius:9px;font-size:13px;cursor:pointer;font-family:inherit">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">GC</div>
  <div style="line-height:1.2"><div style="font-weight:900;font-size:13px">Grade Change</div><div style="font-size:10px;color:#888">PP Plant</div></div>
  <span id="sync-indicator" onclick="showSyncSetup()" title="Sync status - click to configure" style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:rgba(0,0,0,.06);color:#9b9b97;border:1px solid rgba(0,0,0,.1);cursor:pointer;white-space:nowrap">Sync: Setup needed</span>
  <span id="role-badge" style="font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;background:rgba(24,95,165,.12);color:#185FA5;white-space:nowrap">Operator</span>
  <div class="navs">
    <button class="nb on" onclick="goTo('op',this)">Operator</button>
    <button class="nb" onclick="goTo('dash',this)">Dashboard</button>
    <button class="nb" id="eng-nav-btn" onclick="goTo('eng',this)" style="display:none">Engineer</button>
    <button class="nb" onclick="goTo('wb',this)">Workbooks</button>
  </div>
  <div class="fx" style="flex-shrink:0;margin-left:4px;gap:5px">
    <button onclick="doPDF()" style="background:rgba(24,95,165,.1);color:#185FA5;border:1px solid rgba(24,95,165,.25);border-radius:7px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">&#128247; PDF</button>
    <button onclick="doShare()" style="background:rgba(59,109,17,.1);color:#3B6D11;border:1px solid rgba(59,109,17,.25);border-radius:7px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">&#8679; Share</button>
    <button id="logout-btn" onclick="logout()" style="background:rgba(0,0,0,.06);color:#555;border:1px solid rgba(0,0,0,.12);border-radius:7px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">&#8617; Exit</button>
  </div>
</div>

<div id="op" class="page on"></div>
<div id="dash" class="page"></div>
<div id="eng" class="page"></div>
<div id="wb" class="page"></div>

<script>
/* ============================================================
   FIREBASE SYNC CONFIG
   ─────────────────────────────────────────────────────────────
   HOW TO ENABLE REAL-TIME SYNC:
   1. Go to https://console.firebase.google.com
   2. Create a project → Add Web App
   3. Enable Realtime Database (test mode)
   4. Copy your config values below
   5. All tablets on the same network will auto-sync!
   ============================================================ */
var FIREBASE_CONFIG = {
  apiKey:            "",   /* ← paste your apiKey here */
  authDomain:        "",
  databaseURL:       "",   /* ← paste your databaseURL here (required) */
  projectId:         "",
  storageBucket:     "",
  messagingSenderId: "",
  appId:             ""
};

var DB = null;          /* Firebase db reference */
var SYNC_ON = false;    /* true when Firebase is connected */
var SYNC_REF = null;    /* db path reference */
var SYNC_PLANT = "pp-plant-1"; /* change per plant/site if needed */

function initFirebase(){
  if(!FIREBASE_CONFIG.databaseURL){ updateSyncUI("not-configured"); return; }
  try {
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    DB = firebase.database();
    SYNC_REF = DB.ref(SYNC_PLANT);
    /* Listen for remote changes */
    SYNC_REF.on("value", function(snap){
      var data = snap.val();
      if(!data) { pushToFirebase(); return; } /* first time - push local data */
      /* Update local state from remote */
      if(data.TRANS) TRANS = data.TRANS;
      if(data.WB) WB = data.WB;
      /* Re-init ST/CDR/SMP for any new transitions */
      TRANS.forEach(function(t,i){
        if(!ST[i])  ST[i]  = t.steps.map(function(){return"p";});
        if(!CDR[i]) CDR[i] = {};
        if(!SMP[i]) SMP[i] = [];
        if(STARTED[i]===undefined) STARTED[i]=null;
        if(DUR[i]===undefined) DUR[i]=null;
      });
      SYNC_ON = true;
      updateSyncUI("connected");
      /* Refresh current view */
      var activePage = document.querySelector(".page.on");
      if(activePage){
        var id = activePage.id;
        if(id==="eng") renderEng();
        else if(id==="wb") renderWB();
        else if(id==="dash") renderDash();
      }
    }, function(err){
      SYNC_ON = false;
      updateSyncUI("error");
    });
    updateSyncUI("connecting");
  } catch(e){
    updateSyncUI("error");
    console.warn("Firebase init error:", e.message);
  }
}

function pushToFirebase(){
  if(!DB || !SYNC_REF) return;
  SYNC_REF.set({ TRANS: TRANS, WB: WB, updatedBy: OP, updatedAt: Date.now() })
    .then(function(){ updateSyncUI("synced"); })
    .catch(function(){ updateSyncUI("error"); });
}

/* Call this after any PE change to TRANS or WB */
function syncIfPE(){
  if(ROLE==="pe" && DB) pushToFirebase();
}

function updateSyncUI(state){
  var el = document.getElementById("sync-indicator");
  if(!el) return;
  var states = {
    "not-configured": { text:"Sync: Setup needed", col:"#9b9b97", bg:"rgba(0,0,0,.06)" },
    "connecting":     { text:"Sync: Connecting…",  col:"#854F0B", bg:"rgba(250,238,218,.9)" },
    "connected":      { text:"Sync: Connected ✓",  col:"#3B6D11", bg:"rgba(192,221,151,.3)" },
    "synced":         { text:"Sync: Saved ✓",       col:"#3B6D11", bg:"rgba(192,221,151,.3)" },
    "error":          { text:"Sync: Offline",        col:"#E24B4A", bg:"rgba(252,235,235,.9)" }
  };
  var s = states[state] || states["not-configured"];
  el.textContent = s.text;
  el.style.color = s.col;
  el.style.background = s.bg;
  el.style.borderColor = s.col + "40";
}

/* ============================================================
   AUTH
   ============================================================ */
var ROLE = null;
var PE_PASSWORD = "pe1234";

function showOpLogin(){
  document.getElementById("op-login-form").style.display="block";
  document.getElementById("pe-login-form").style.display="none";
  document.getElementById("op-name").value="";
  document.getElementById("op-err").style.display="none";
  setTimeout(function(){document.getElementById("op-name").focus();},50);
}
function hideOpLogin(){document.getElementById("op-login-form").style.display="none";}
function loginOp(){
  var n=document.getElementById("op-name").value.trim();
  if(!n){document.getElementById("op-err").style.display="block";return;}
  loginAs("operator",n);
}
function showPELogin(){
  document.getElementById("pe-login-form").style.display="block";
  document.getElementById("op-login-form").style.display="none";
  document.getElementById("pe-pwd").value="";
  document.getElementById("pe-err").style.display="none";
  setTimeout(function(){document.getElementById("pe-pwd").focus();},50);
}
function hidePELogin(){document.getElementById("pe-login-form").style.display="none";document.getElementById("pe-pwd").value="";}
function loginPE(){
  var pwd=document.getElementById("pe-pwd").value;
  if(pwd===PE_PASSWORD){
    hidePELogin();
    var n=prompt("Enter your name:","Process Engineer");
    loginAs("pe",n||"Process Engineer");
  } else {
    document.getElementById("pe-err").style.display="block";
    document.getElementById("pe-pwd").value="";
    setTimeout(function(){document.getElementById("pe-pwd").focus();},50);
  }
}
function loginAs(role,name){
  ROLE=role; if(name)OP=name;
  document.getElementById("login-screen").style.display="none";
  updateNavForRole();
  renderOp();
}
function logout(){
  ROLE=null; OP="Operator";
  document.getElementById("login-screen").style.display="flex";
  hideOpLogin(); hidePELogin();
  document.querySelectorAll(".page").forEach(function(el){el.classList.remove("on");});
  document.querySelectorAll(".nb").forEach(function(el){el.classList.remove("on");});
  document.getElementById("op").classList.add("on");
  document.querySelector(".nb").classList.add("on");
}
function updateNavForRole(){
  var e=document.getElementById("eng-nav-btn");
  if(e) e.style.display=ROLE==="pe"?"inline-block":"none";
  var rb=document.getElementById("role-badge");
  if(rb){rb.textContent=ROLE==="pe"?"Process Engineer":"Operator";rb.style.background=ROLE==="pe"?"rgba(59,109,17,.12)":"rgba(24,95,165,.12)";rb.style.color=ROLE==="pe"?"#3B6D11":"#185FA5";}
  var lb=document.getElementById("logout-btn");

function uid(){return"x"+Date.now().toString(36)+Math.random().toString(36).slice(2,4);}
function nowT(){return new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});}
function getTR(){return TRANS[ATID]||TRANS[0];}
function getST(i){if(!ST[i])ST[i]=TRANS[i].steps.map(function(){return"p";});return ST[i];}
function h(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function fmtS(s){var hr=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return hr>0?hr+"h "+p2(m)+"m "+p2(sc)+"s":p2(m)+"m "+p2(sc)+"s";}
function p2(n){return String(n).padStart(2,"0");}
function fmtMs(ms){return fmtS(Math.floor(ms/1000));}

function goTo(id,btn){
  document.querySelectorAll(".page").forEach(function(el){el.classList.remove("on");});
  document.querySelectorAll(".nb").forEach(function(el){el.classList.remove("on");});
  document.getElementById(id).classList.add("on");
  btn.classList.add("on");
  if(id==="op")renderOp();
  else if(id==="dash")renderDash();
  else if(id==="eng")renderEng();
  else if(id==="wb")renderWB();
}

/* ============================================================
   QUALITY / SPEC HELPERS
   ============================================================ */
function qbar(val,lo,hi,tgt,bl,bh,label,unit,spec){
  if(val===null||isNaN(val))return'<div style="background:rgba(0,0,0,.05);padding:9px 11px;border-radius:7px;font-size:12px;color:#9b9b97;margin-bottom:12px">'+h(label)+': no data yet</div>';
  var rng=hi-lo;
  function pct(v){return Math.max(0,Math.min(100,((v-lo)/rng)*100));}
  var col=val>=bl&&val<=bh?"#3B6D11":val>=lo&&val<=hi?"#EF9F27":"#E24B4A";
  return'<div class="qw">'+
    '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span style="font-weight:600;color:#555">'+h(label)+'</span>'+
    '<span style="font-size:11px;background:rgba(250,238,218,.9);color:#854F0B;padding:1px 7px;border-radius:4px;font-weight:600;border:1px solid rgba(250,199,117,.4)">'+h(spec)+'</span></div>'+
    '<div style="display:flex;justify-content:space-between;font-size:10px;color:#9b9b97;margin-bottom:3px"><span>'+lo+'</span><span>tgt '+tgt+'</span><span>'+hi+'</span></div>'+
    '<div class="qbar"><div class="qband" style="left:'+pct(bl)+'%;width:'+(pct(bh)-pct(bl))+'%"></div><div class="qtgt" style="left:'+(pct(tgt)-0.5)+'%"></div><div class="qdot" style="left:calc('+pct(val)+'% - 5px);background:'+col+'"></div></div>'+
    '<div style="text-align:right;font-family:monospace;font-weight:900;color:'+col+'">'+val.toFixed(2)+'<span style="font-size:11px;color:#777;font-family:inherit;font-weight:400;margin-left:4px">'+h(unit)+'</span></div></div>';
}
function specBox(label,lo,hi,tgt,unit,color){
  if(!lo&&!hi&&!tgt)return"";
  return'<div class="spec-box" style="border-left-color:'+h(color)+'"><div style="font-size:10px;color:#9b9b97;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;font-weight:600">'+h(label)+'</div>'+
    '<div style="font-size:13px;font-weight:800;color:'+h(color)+';margin-bottom:2px">'+lo+' - '+hi+' <span style="font-size:11px;font-weight:500">'+h(unit)+'</span></div>'+

}

/* ============================================================
   TREND CHART — Pellet (solid/circles) + Powder (dashed/squares)
   ============================================================ */
function makeTrend(smp,tr){
  if(smp.length<2)return'<div style="text-align:center;color:#9b9b97;padding:14px;font-size:12px">Add at least 2 results to see trend</div>';
  var pellets=smp.filter(function(r){return !r.stype||r.stype==="Pellet";});
  var powders=smp.filter(function(r){return r.stype==="Powder";});

  function makeSVG(key,label,unit,lo,hi,tgt,bl,bh,mainCol){
    var W=300,H=108,PAD=34,RP=8,TP=26,BP=20,PW=W-PAD-RP,PH=H-TP-BP;
    var n=smp.length; var xS=n>1?PW/(n-1):PW;
    /* Map each sample to an x position based on global index */
    function pts(arr){
      return arr.map(function(r){
        var gi=smp.indexOf(r); var v=parseFloat(r[key]);
        if(isNaN(v))return null;
        var x=PAD+(gi/(Math.max(n-1,1)))*PW;
        var y=TP+PH-(((v-lo)/(hi-lo))*PH);
        return{x:x,y:Math.max(TP,Math.min(TP+PH,y)),v:v,t:r.time};
      }).filter(Boolean);
    }
    var pelPts=pts(pellets), powPts=pts(powders), allPts=pts(smp);
    if(!allPts.length)return'<div style="font-size:10px;color:#9b9b97;text-align:center;padding:10px">'+label+': no data</div>';
    function py(v){return TP+PH-(((v-lo)/(hi-lo))*PH);}
    var by1=py(bh),by2=py(bl),ty=py(tgt);
    var s='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">';
    /* Header */
    s+='<text x="'+PAD+'" y="11" font-size="9" font-weight="700" fill="'+mainCol+'">'+label+'</text>';
    s+='<text x="'+PAD+'" y="20" font-size="7.5" fill="#9b9b97">'+lo+'-'+hi+' '+unit+' | tgt '+tgt+'</text>';
    /* Spec lines */
    s+='<line x1="'+PAD+'" y1="'+TP+'" x2="'+(PAD+PW)+'" y2="'+TP+'" stroke="#E24B4A" stroke-width="0.5" stroke-dasharray="2,4" opacity="0.5"/>';
    s+='<line x1="'+PAD+'" y1="'+(TP+PH)+'" x2="'+(PAD+PW)+'" y2="'+(TP+PH)+'" stroke="#E24B4A" stroke-width="0.5" stroke-dasharray="2,4" opacity="0.5"/>';
    /* Target band */
    s+='<rect x="'+PAD+'" y="'+by1+'" width="'+PW+'" height="'+(by2-by1)+'" fill="#C0DD97" opacity="0.35" rx="1"/>';
    /* Target line */
    s+='<line x1="'+PAD+'" y1="'+ty+'" x2="'+(PAD+PW)+'" y2="'+ty+'" stroke="#3B6D11" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>';
    /* Y labels */
    s+='<text x="'+(PAD-2)+'" y="'+(TP+4)+'" text-anchor="end" font-size="7.5" fill="#9b9b97">'+hi+'</text>';
    s+='<text x="'+(PAD-2)+'" y="'+(TP+PH+4)+'" text-anchor="end" font-size="7.5" fill="#9b9b97">'+lo+'</text>';
    s+='<text x="'+(PAD-2)+'" y="'+(ty+3)+'" text-anchor="end" font-size="7.5" fill="#3B6D11" font-weight="700">'+tgt+'</text>';
    /* Powder line — dashed purple */
    if(powPts.length>1){var pl=powPts.map(function(p,i){return(i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1);}).join(" ");s+='<path d="'+pl+'" fill="none" stroke="#534AB7" stroke-width="2" stroke-dasharray="5,3" stroke-linecap="round" stroke-linejoin="round"/>';}
    /* Pellet line — solid blue */
    if(pelPts.length>1){var pl2=pelPts.map(function(p,i){return(i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1);}).join(" ");s+='<path d="'+pl2+'" fill="none" stroke="#185FA5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';}
    /* Powder dots — squares */
    powPts.forEach(function(p){
      var inB=p.v>=bl&&p.v<=bh,inS=p.v>=lo&&p.v<=hi,c=inB?"#3B6D11":inS?"#EF9F27":"#E24B4A";
      s+='<rect x="'+(p.x-4).toFixed(1)+'" y="'+(p.y-4).toFixed(1)+'" width="8" height="8" fill="'+c+'" stroke="#fff" stroke-width="1.2" rx="1"/>';
      s+='<text x="'+p.x.toFixed(1)+'" y="'+(p.y-8).toFixed(1)+'" text-anchor="middle" font-size="7.5" fill="'+c+'" font-weight="700">'+p.v.toFixed(2)+'</text>';
    });
    /* Pellet dots — circles */
    pelPts.forEach(function(p){
      var inB=p.v>=bl&&p.v<=bh,inS=p.v>=lo&&p.v<=hi,c=inB?"#3B6D11":inS?"#EF9F27":"#E24B4A";
      s+='<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="3.5" fill="'+c+'" stroke="#fff" stroke-width="1.2"/>';
      s+='<text x="'+p.x.toFixed(1)+'" y="'+(p.y-8).toFixed(1)+'" text-anchor="middle" font-size="7.5" fill="'+c+'" font-weight="700">'+p.v.toFixed(2)+'</text>';
    });
    /* X time labels — every point */
    /* X time labels — show label for each unique time, no duplicates */
    var shownTimes={};
    allPts.forEach(function(p,pi){
      if(shownTimes[p.t]) return; /* skip duplicate times */
      shownTimes[p.t]=true;
      var anchor=pi===0?"start":pi===allPts.length-1?"end":"middle";
      s+='<text x="'+p.x.toFixed(1)+'" y="'+(H-3)+'" text-anchor="'+anchor+'" font-size="7" fill="#9b9b97">'+p.t+'</text>';
    });
    /* Legend */
    var lx=PAD+PW-90,ly=TP-4;
    if(pelPts.length){s+='<line x1="'+lx+'" y1="'+(ly+2)+'" x2="'+(lx+14)+'" y2="'+(ly+2)+'" stroke="#185FA5" stroke-width="2"/><circle cx="'+(lx+7)+'" cy="'+(ly+2)+'" r="2.5" fill="#185FA5"/><text x="'+(lx+18)+'" y="'+(ly+5)+'" font-size="7.5" fill="#185FA5" font-weight="600">Pellet</text>';}
    if(powPts.length){s+='<line x1="'+lx+'" y1="'+(ly+11)+'" x2="'+(lx+14)+'" y2="'+(ly+11)+'" stroke="#534AB7" stroke-width="2" stroke-dasharray="4,2"/><rect x="'+(lx+4)+'" y="'+(ly+7)+'" width="6" height="6" fill="#534AB7" rx="1"/><text x="'+(lx+18)+'" y="'+(ly+14)+'" font-size="7.5" fill="#534AB7" font-weight="600">Powder</text>';}
    s+='</svg>';
    return s;
  }

  var charts=[];
  charts.push(makeSVG("mfr","MFR","g/10min",tr.mfrLo,tr.mfrHi,tr.mfrT,tr.mfrBl,tr.mfrBh,"#185FA5"));
  var hasXS=smp.some(function(r){return !isNaN(parseFloat(r.xs));});
  if(hasXS)charts.push(makeSVG("xs","XS","%",tr.xsLo,tr.xsHi,tr.xsT,tr.xsBl,tr.xsBh,"#534AB7"));
  if(tr.c2Lo){var c2b=(tr.c2Hi-tr.c2Lo)*0.25;charts.push(makeSVG("c2","C2 Content","%",tr.c2Lo,tr.c2Hi,tr.c2T,tr.c2Lo+c2b,tr.c2Hi-c2b,"#993C1D"));}
  var cols=charts.length===3?"1fr 1fr 1fr":charts.length===2?"1fr 1fr":"1fr";
  return'<div style="display:grid;grid-template-columns:'+cols+';gap:7px">'+
    charts.map(function(s){return'<div style="background:rgba(0,0,0,.03);border-radius:7px;padding:7px 6px;border:1px solid rgba(0,0,0,.06)">'+s+'</div>';}).join("")+'</div>';
}

/* ============================================================
   ELAPSED TIMER
   ============================================================ */
function startELT(){
  if(ELI)clearInterval(ELI);
  ELI=setInterval(function(){var el=document.getElementById("el-val");if(el&&STARTED[ATID])el.textContent=fmtMs(Date.now()-STARTED[ATID]);},1000);
}
function startTrans(){
  var tr=getTR();STARTED[ATID]=Date.now();
  ST[ATID]=tr.steps.map(function(){return"p";});ST[ATID][0]="a";
  ELOG.push({time:nowT(),type:"info",msg:"Grade change started: "+tr.from+" to "+tr.to+" | Op: "+OP});
  startELT();renderOp();
}
function resetTrans(){
  if(!confirm("Reset? All progress will be lost."))return;
  var tr=getTR();STARTED[ATID]=null;DUR[ATID]=null;
  ST[ATID]=tr.steps.map(function(){return"p";});CDR[ATID]={};
  if(ELI){clearInterval(ELI);ELI=null;}
  ELOG.push({time:nowT(),type:"warn",msg:"Reset: "+tr.from+" to "+tr.to});
  renderOp();
}
function chT(v){ATID=parseInt(v);if(ELI){clearInterval(ELI);ELI=null;}renderOp();}
function cnfStep(si){
  var sts=getST(ATID),tr=getTR();
  var nel=document.getElementById("nt_"+si);var notes=nel?nel.value:"";
  sts[si]="c";if(si+1<sts.length)sts[si+1]="a";
  if(!CDR[ATID])CDR[ATID]={};
  CDR[ATID][si]={time:nowT(),operator:OP,notes:notes};
  ELOG.push({time:nowT(),type:"confirm",msg:"Step "+(si+1)+" confirmed by "+OP+(notes?" - "+notes:"")});
  var sid=tr.steps[si].id;
  if(window["_cdi_"+sid]){clearInterval(window["_cdi_"+sid]);delete window["_cdi_"+sid];}
  if(sts.every(function(s){return s==="c";})){
    DUR[ATID]=Date.now()-STARTED[ATID];
    ELOG.push({time:nowT(),type:"confirm",msg:"Complete! "+tr.from+" to "+tr.to+" - "+fmtMs(DUR[ATID])});
  }
  renderOp();
}
function startCD(sid,mins){
  window["_cdr_"+sid]=mins*60;
  window["_cdi_"+sid]=setInterval(function(){
    if(window["_cdr_"+sid]>0){window["_cdr_"+sid]--;
      var el=document.getElementById("cdv_"+sid),ef=document.getElementById("cdf_"+sid);
      if(el){var r=window["_cdr_"+sid];el.textContent=r===0?"TIME ELAPSED":fmtS(r);if(r===0)el.style.color="#E24B4A";}
      if(ef){var sp=null;TRANS.forEach(function(t){t.steps.forEach(function(s){if(s.id===sid)sp=s;});});if(sp){var tot=sp.mins*60,pp=Math.round((tot-window["_cdr_"+sid])/tot*100);ef.style.width=pp+"%";ef.style.background=pp>90?"#E24B4A":pp>70?"#EF9F27":"#378ADD";}}
    }else{clearInterval(window["_cdi_"+sid]);}
  },1000);
}
function togSF(){var el=document.getElementById("sf");if(el)el.classList.toggle("hidden");}
function saveSmp(){
  var mfr=document.getElementById("ns-mfr").value,xs=document.getElementById("ns-xs").value;
  if(!mfr&&!xs){alert("Enter at least MFR or XS.");return;}
  var tel=document.querySelector('input[name="smp-type"]:checked');
  var stype=tel?tel.value:"Pellet";
  if(!SMP[ATID])SMP[ATID]=[];
  SMP[ATID].push({id:uid(),time:document.getElementById("ns-time").value||nowT(),stype:stype,mfr:mfr,xs:xs,c2:document.getElementById("ns-c2").value,notes:document.getElementById("ns-notes").value});
  ELOG.push({time:nowT(),type:"confirm",msg:"Lab result ("+stype+"): MFR "+(mfr||"-")+" XS "+(xs||"-")+"%"});
  renderOp();
}
function delSmp(idx){if(!SMP[ATID])return;SMP[ATID].splice(idx,1);renderOp();}

/* ============================================================
   OPERATOR RENDER
   ============================================================ */
function renderOp(){
  var tr=getTR(),i=ATID,sts=getST(i),smp=SMP[i]||[],cdat=CDR[i]||{};

  var lMFR=latest?parseFloat(latest.mfr):NaN,lXS=latest?parseFloat(latest.xs):NaN,lC2=latest?parseFloat(latest.c2):NaN;

    specBox("XS",tr.xsLo,tr.xsHi,tr.xsT,"%","#534AB7")+

    qbar(isNaN(lXS)?null:lXS,tr.xsLo,tr.xsHi,tr.xsT,tr.xsBl,tr.xsBh,"XS","%",tr.xsLo+"-"+tr.xsHi+"%");
  if(tr.c2Lo){var c2bw=(tr.c2Hi-tr.c2Lo)*0.25;gaugeH+=qbar(isNaN(lC2)?null:lC2,tr.c2Lo,tr.c2Hi,tr.c2T,tr.c2Lo+c2bw,tr.c2Hi-c2bw,"C2 Content","%",tr.c2Lo+"-"+tr.c2Hi+"%");}

      '<td class="'+(isNaN(mfr)?"":mok?"ok":"bad")+'">'+h(r.mfr||"-")+'</td>'+
      '<td class="'+(isNaN(xs)?"":xok?"ok":"bad")+'">'+h(r.xs||"-")+'</td>'+
      '<td class="'+(isNaN(c2)||!tr.c2Lo?"":cok?"ok":"bad")+'">'+h(r.c2||"-")+'</td>'+
      '<td style="color:#777">'+h(r.notes||"-")+'</td>'+
      '<td><button onclick="delSmp('+origIdx+')" style="background:none;border:none;color:#E24B4A;cursor:pointer;font-size:14px;font-weight:700">x</button></td>'+
    '</tr>';
  }).join("");}
  var logH=ELOG.slice().reverse().slice(0,8).map(function(ev){
    return'<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.05);align-items:flex-start">'+
      '<span style="font-size:11px;font-family:monospace;color:#9b9b97;white-space:nowrap;padding-top:2px">'+h(ev.time)+'</span>'+
      '<div style="width:7px;height:7px;border-radius:50%;background:'+(ev.type==="confirm"?"#639922":"#ccc")+';flex-shrink:0;margin-top:5px"></div>'+
      '<span style="font-size:13px">'+h(ev.msg)+'</span></div>';
  }).join("");
  var nextS=120-Math.floor((Date.now()/60000)%120);
  var out='<div class="card"><div class="fx" style="margin-bottom:8px">'+
    '<div style="text-align:center"><div style="font-size:10px;color:#999;font-weight:600;text-transform:uppercase">Current</div><div class="mon" style="font-size:18px;font-weight:900">'+h(tr.from)+'</div></div>'+
    '<div style="font-size:24px;color:#ccc;font-weight:300;padding:0 4px">&#8594;</div>'+
    '<div style="text-align:center"><div style="font-size:10px;color:#999;font-weight:600;text-transform:uppercase">Target</div><div class="mon" style="font-size:18px;font-weight:900;color:#185FA5">'+h(tr.to)+'</div></div>'+
    '<span style="background:rgba(24,95,165,.1);color:#185FA5;font-size:11px;padding:3px 9px;border-radius:6px;font-weight:700;border:1px solid rgba(24,95,165,.18)">'+h(tr.type)+'</span>'+
    '</div><div class="fx"><select class="sel" onchange="chT(this.value)">'+opts+'</select>'+
    '<span style="font-size:12px;color:#777"><b style="color:#639922">'+h(tr.status)+'</b> '+h(tr.ver)+' | Op: <b>'+h(OP)+'</b></span></div></div>';
  out+='<div class="card" style="background:rgba(24,95,165,.04);border-color:rgba(24,95,165,.15)">'+
    '<div class="ct">Specifications - '+h(tr.to)+'</div>'+specH+gaugeH+
    '<div style="font-size:11px;color:#9b9b97;margin-top:4px">Green=target band | Orange=in spec | Red=out of spec</div></div>';
  if(!isS){
    out+='<div class="start-box"><div class="start-icon">&#9654;</div>'+
      '<div style="font-size:21px;font-weight:900;margin-bottom:7px">Ready to start?</div>'+
      '<div style="font-size:14px;color:#6b6b67;margin-bottom:24px">'+h(tr.from)+' to '+h(tr.to)+' ('+h(tr.type)+')<br>'+tr.steps.length+' steps | Op: <b>'+h(OP)+'</b></div>'+
      '<button class="btn-start" onclick="startTrans()">&#9654; Start Grade Change</button></div>';
  } else if(allDone){

    out+='<div class="card" style="padding:11px 16px"><div style="display:flex;justify-content:space-between;margin-bottom:4px">'+
      '<b style="font-size:12px;color:#777;text-transform:uppercase;letter-spacing:.04em">Progress</b>'+

    var rows=sts.map(function(st,si){

          '<span style="font-family:monospace;font-weight:800;color:#854F0B" id="cdv_'+step.id+'">'+fmtS(rem)+'</span></div>'+
          '<div style="height:5px;background:rgba(0,0,0,.08);border-radius:3px;overflow:hidden;margin-bottom:6px">'+

        '<div style="font-size:11px;color:#777;margin-bottom:6px">'+h(step.tgt)+'</div>'+
        cdH+ntH+stmpH+'<div style="margin-top:6px">'+btnH+'</div></td></tr>';
    }).join("");
    out+='<div class="card" style="padding:0;overflow:hidden"><div style="padding:10px 16px;border-bottom:1px solid rgba(0,0,0,.06);font-weight:800;font-size:12px;color:#777;text-transform:uppercase;letter-spacing:.04em">'+tr.steps.length+' Steps</div>'+
      '<table class="stbl"><tbody>'+rows+'</tbody></table></div>';
    startELT();
  }
  out+='<div class="card"><div class="fx" style="margin-bottom:10px;justify-content:space-between">'+
    '<span class="ct" style="margin:0">Lab Results</span><button class="bb" onclick="togSF()">+ Add result</button></div>'+
    '<div id="sf" class="hidden" style="background:rgba(192,221,151,.15);border:1px solid rgba(192,221,151,.4);border-radius:11px;padding:13px;margin-bottom:10px">'+
    '<div style="display:flex;gap:8px;margin-bottom:10px">'+
      '<div style="font-size:12px;font-weight:700;color:#555;margin-top:8px;white-space:nowrap">Type:</div>'+
      '<label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;font-weight:600;padding:6px 12px;border-radius:7px;border:1.5px solid rgba(24,95,165,.3);background:rgba(24,95,165,.08);color:#185FA5">'+
        '<input type="radio" name="smp-type" value="Pellet" checked style="margin:0"> Pellet</label>'+
      '<label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;font-weight:600;padding:6px 12px;border-radius:7px;border:1.5px solid rgba(83,74,183,.3);background:rgba(83,74,183,.08);color:#534AB7">'+
        '<input type="radio" name="smp-type" value="Powder" style="margin:0"> Powder</label>'+
    '</div>'+
    '<div class="g3"><div class="fld"><label>Time</label><input id="ns-time" placeholder="HH:MM"></div>'+

    '<div class="fld"><label>C2 bonded (%)</label><input id="ns-c2" type="number" step="0.01" placeholder="optional"></div></div>'+
    '<div class="g2"><div class="fld"><label>XS (%)</label><input id="ns-xs" type="number" step="0.01" placeholder="3.72"></div>'+
    '<div class="fld"><label>Notes</label><input id="ns-notes" placeholder="Remarks"></div></div>'+
    '<div class="fx"><button class="bg" onclick="saveSmp()">Save</button><button class="bx" onclick="togSF()">Cancel</button></div></div>';
  if(smp.length>0){
    out+='<div style="margin-bottom:13px;padding:10px;background:rgba(24,95,165,.04);border-radius:9px;border:1px solid rgba(24,95,165,.1)">'+

/* ============================================================
   DASHBOARD — active transition only
   ============================================================ */
function renderDash(){
  var tr=getTR(),i=ATID,sts=getST(i);
  var isS=!!STARTED[i],done=sts.filter(function(s){return s==="c";}).length;
  var allD=isS&&done===sts.length,smp=SMP[i]||[];
  var onSp=0,tot=0;
  smp.forEach(function(r){var m=parseFloat(r.mfr);if(!isNaN(m)){tot++;if(m>=tr.mfrLo&&m<=tr.mfrHi)onSp++;}});
  var rate=tot>0?Math.round(onSp/tot*100):null,off=tot-onSp;
  var pct=sts.length>0?Math.round(done/sts.length*100):0;
  var durStr=allD&&DUR[i]?fmtMs(DUR[i]):isS?fmtMs(Date.now()-STARTED[i]):"--";
  var stl=!isS?"Not started":allD?"Complete":"In progress",stc=!isS?"#9b9b97":allD?"#3B6D11":"#185FA5";
  var out='<div class="card"><div class="fx" style="margin-bottom:8px"><div style="flex:1">'+
    '<div class="fx" style="margin-bottom:3px"><span class="mon" style="font-size:16px;font-weight:900">'+h(tr.from)+'</span>'+
    '<span style="color:#ccc;font-size:20px;font-weight:300;padding:0 5px">&#8594;</span>'+
    '<span class="mon" style="font-size:16px;font-weight:900;color:#185FA5">'+h(tr.to)+'</span>'+
    '<span style="font-size:11px;background:rgba(0,0,0,.05);color:#777;padding:2px 8px;border-radius:5px">'+h(tr.type)+'</span></div>'+
    '<div style="font-size:11px;color:#9b9b97">'+h(tr.ver)+' | '+h(tr.add)+'</div></div>'+
    '<div style="text-align:right"><div style="font-size:12px;font-weight:700;color:'+stc+'">'+stl+'</div>'+
    '<div class="mon" style="font-size:11px;color:#9b9b97">'+done+'/'+sts.length+'</div></div></div>'+
    '<div class="pbar" style="margin-bottom:12px"><div style="height:100%;width:'+pct+'%;background:'+(allD?"linear-gradient(90deg,#3B6D11,#5a9a1a)":isS?"linear-gradient(90deg,#185FA5,#2b7fc4)":"rgba(0,0,0,.1)")+';border-radius:4px;transition:width .5s"></div></div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px">'+
    '<div style="background:rgba(24,95,165,.07);border-radius:9px;padding:11px;text-align:center;border:1px solid rgba(24,95,165,.14)">'+
      '<div style="font-size:10px;color:#777;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Duration</div>'+
      '<div class="mon" style="font-size:17px;font-weight:900;color:#185FA5">'+durStr+'</div></div>'+
    '<div style="background:rgba(231,50,50,.06);border-radius:9px;padding:11px;text-align:center;border:1px solid rgba(231,50,50,.13)">'+
      '<div style="font-size:10px;color:#777;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Off-spec results</div>'+
      '<div class="mon" style="font-size:17px;font-weight:900;color:'+(off>0?"#E24B4A":"#3B6D11")+'">'+off+'<span style="font-size:11px;font-weight:500;color:#9b9b97;margin-left:3px">/ '+tot+'</span></div></div>'+
    '<div style="background:rgba(59,109,17,.07);border-radius:9px;padding:11px;text-align:center;border:1px solid rgba(59,109,17,.13)">'+
      '<div style="font-size:10px;color:#777;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">On-spec rate</div>'+
      '<div class="mon" style="font-size:17px;font-weight:900;color:'+(rate===null?"#9b9b97":rate>=90?"#3B6D11":rate>=70?"#EF9F27":"#E24B4A")+'">'+(rate===null?"--":rate+"%")+'</div></div></div></div>';
  /* Selector for other transitions */
  var opts=TRANS.map(function(t,ti){return'<option value="'+ti+'"'+(ti===i?" selected":"")+'>'+h(t.from)+' to '+h(t.to)+'</option>';}).join("");
  out+='<div class="card"><div style="font-size:12px;font-weight:700;color:#777;margin-bottom:6px">Switch transition</div>'+
    '<select class="sel" onchange="ATID=parseInt(this.value);renderDash()">'+opts+'</select></div>';
  document.getElementById("dash").innerHTML=out;
}

function engOpenTrans(i){ENG_OPEN=(ENG_OPEN===i?-1:i);ENG_EDIT_STEP=null;ENG_PASTE=-1;renderEng();}
function engPaste(i){ENG_PASTE=(ENG_PASTE===i?-1:i);ENG_EDIT_STEP=null;renderEng();}
function engEditStep(ti,si){
  if(ROLE!=="pe")return;

}
function engDelStep(ti,si){if(ROLE!=="pe")return;if(!confirm("Delete step?"))return;TRANS[ti].steps.splice(si,1);if(ST[ti])ST[ti].splice(si,1);ENG_EDIT_STEP=null;renderEng();}
function engAddStep(ti){
  if(ROLE!=="pe")return;
  TRANS[ti].steps.push({id:uid(),title:"New step",instr:"Enter instruction.",dcs:null,tgt:"",trigger:"",mins:null,role:"Operator"});
  if(!ST[ti])ST[ti]=[];ST[ti].push("p");

}
function engSaveStep(){
  if(!ENG_EDIT_STEP)return;var ti=ENG_EDIT_STEP[0],si=ENG_EDIT_STEP[1],s=TRANS[ti].steps[si];
  s.title=document.getElementById("ef-ti").value;s.trigger=document.getElementById("ef-tr").value;

  s.role=document.getElementById("ef-ro").value;s.instr=document.getElementById("ef-in").value;

function engImport(ti){
  if(ROLE!=="pe")return;
  var ta=document.getElementById("paste-ta-"+ti);if(!ta||!ta.value.trim()){alert("Paste some text first.");return;}
  var lines=ta.value.trim().split("\n").map(function(l){return l.trim();}).filter(Boolean);
  var steps=[],cur=null;
  lines.forEach(function(line){
    var m=line.match(/^(\d+)[.)\s]+(.+)/);
    if(m){if(cur)steps.push(cur);cur={instr:m[2],trigger:"See instruction",mins:null,role:"Operator",title:"Step "+m[1]+": "+(m[2].length>55?m[2].slice(0,55)+"...":m[2])};}
    else if(cur)cur.instr+=" "+line;
  });
  if(cur)steps.push(cur);
  if(!steps.length){alert("No numbered steps found.");return;}
  TRANS[ti].steps=steps.map(function(s){return Object.assign({id:uid(),dcs:null,tgt:""},s);});
  ST[ti]=TRANS[ti].steps.map(function(){return"p";});
  ENG_PASTE=-1;alert(steps.length+" steps imported!");renderEng();
}
function ntGradeChg(sel){
  var customId=sel.getAttribute("data-custom");
  var inp=customId?document.getElementById(customId):null;
  if(inp) inp.style.display=(sel.value==="__new")?"block":"none";
}
function ntGetGrade(selId,customId){
  var sel=document.getElementById(selId);
  if(!sel) return "";
  if(sel.value==="__new"){
    var inp=document.getElementById(customId);

}
function engCreateTrans(){
  var fr=ntGetGrade("nt-fr","nt-fr-custom"),to=ntGetGrade("nt-to","nt-to-custom");
  if(!fr||!to){alert("Select or type From and To grades.");return;}
  var mlo=parseFloat(document.getElementById("nt-mlo").value)||0,mhi=parseFloat(document.getElementById("nt-mhi").value)||0,mt=parseFloat(document.getElementById("nt-mt").value)||0;
  var xlo=parseFloat(document.getElementById("nt-xlo").value)||0,xhi=parseFloat(document.getElementById("nt-xhi").value)||0,xt=parseFloat(document.getElementById("nt-xt").value)||0;
  var clo=document.getElementById("nt-clo").value?parseFloat(document.getElementById("nt-clo").value):null;
  var chi=document.getElementById("nt-chi").value?parseFloat(document.getElementById("nt-chi").value):null;
  var ct=document.getElementById("nt-ct").value?parseFloat(document.getElementById("nt-ct").value):null;
  var mw=(mhi-mlo)*0.3,xw=(xhi-xlo)*0.3;
  var nt={id:uid(),from:fr,to:to,type:document.getElementById("nt-tp").value||"HOMO-HOMO",
    ver:document.getElementById("nt-vr").value||"v1.0",status:"Approved",
    mfrLo:mlo,mfrHi:mhi,mfrT:mt,mfrBl:mlo+mw,mfrBh:mhi-mw,
    xsLo:xlo,xsHi:xhi,xsT:xt,xsBl:xlo+xw,xsBh:xhi-xw,
    c2Lo:clo,c2Hi:chi,c2T:ct,add:document.getElementById("nt-ad").value||"",steps:[]};
  /* Parse steps from textarea */
  var stepsEl=document.getElementById("nt-steps");
  if(stepsEl&&stepsEl.value.trim()){
    var lines=stepsEl.value.trim().split("\n").map(function(l){return l.trim();}).filter(Boolean);
    var steps=[],cur=null;
    lines.forEach(function(line){
      var m=line.match(/^(\d+)[.)\s]+(.+)/);
      if(m){if(cur)steps.push(cur);cur={instr:m[2],trigger:"See instruction",mins:null,role:"Operator",title:"Step "+m[1]+": "+(m[2].length>55?m[2].slice(0,55)+"...":m[2])};}
      else if(cur)cur.instr+=" "+line;
    });
    if(cur)steps.push(cur);
    nt.steps=steps.map(function(s){return Object.assign({id:uid(),dcs:null,tgt:""},s);});
  }
  TRANS.push(nt);var ni=TRANS.length-1;ST[ni]=[];CDR[ni]={};SMP[ni]=[];STARTED[ni]=null;DUR[ni]=null;
  ENG_SHOW_NEW=false;ENG_OPEN=ni;
  syncIfPE();
  alert("Transition created"+(nt.steps.length?" with "+nt.steps.length+" steps!":" - add steps using the Paste or + Add step buttons."));
  renderEng();
}

function buildTextReport(){
  var tr=getTR();var sts=getST(ATID);var smp=SMP[ATID]||[];
  var done=sts.filter(function(s){return s==="c";}).length;
  var lines=["PP PLANT - GRADE CHANGE REPORT","================================",
    "Transition: "+tr.from+" to "+tr.to+" ("+tr.type+")","Version: "+tr.ver+" | Status: "+tr.status,
    "Operator: "+OP,"Progress: "+done+"/"+sts.length+" steps",""];
  lines.push("STEPS:","------");
  tr.steps.forEach(function(step,i){
    var st=sts[i]||"p";var cd=(CDR[ATID]||{})[i];
    var stl=st==="c"?"[DONE]":st==="a"?"[ACTIVE]":"[PENDING]";
    lines.push(stl+" Step "+(i+1)+": "+step.title);
    if(cd)lines.push("  Confirmed "+cd.time+" by "+cd.operator+(cd.notes?" - "+cd.notes:""));
  });
  if(smp.length){lines.push("","LAB RESULTS:","------------");
    smp.forEach(function(r){lines.push("  "+r.time+" | "+(r.stype||"Pellet")+" | MFR: "+(r.mfr||"-")+" | XS: "+(r.xs||"-")+(r.c2?" | C2: "+r.c2:"")+(r.notes?" | "+r.notes:""));});
  }
  lines.push("","Generated: "+new Date().toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}));
  return lines.join("\n");
}
function doPDF(){
  var pages=document.querySelectorAll(".page");var hidden=[];
  pages.forEach(function(p){if(!p.classList.contains("on")){hidden.push(p);p.classList.add("on");}});
  window.print();
  setTimeout(function(){hidden.forEach(function(p){p.classList.remove("on");});},1000);
}
function closeShareModal(){var d=document.getElementById("share-modal");if(d)d.remove();}
function copyReport(){
  var ta=document.getElementById("report-text");if(!ta)return;
  if(navigator.clipboard){navigator.clipboard.writeText(ta.value).then(function(){showToast("Copied!");});}
  else{ta.select();document.execCommand("copy");showToast("Copied!");}
}
function emailReport(){
  var tr=getTR();var sub=encodeURIComponent("Grade Change Report: "+tr.from+" to "+tr.to);
  var ta=document.getElementById("report-text");
  window.open("mailto:?subject="+sub+"&body="+encodeURIComponent(ta?ta.value:buildTextReport()));
}
function whatsappReport(){window.open("https://wa.me/?text="+encodeURIComponent(buildTextReport()));}
function showToast(msg){
  var t=document.getElementById("toast");
  if(!t){t=document.createElement("div");t.id="toast";t.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;transition:opacity .3s";document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity="1";clearTimeout(t._to);t._to=setTimeout(function(){t.style.opacity="0";},2000);
}

      '<div style="margin-bottom:12px"><label style="font-size:11px;font-weight:700;color:#555;display:block;margin-bottom:3px">Plant/Site ID (same on all devices)</label>'+
      '<input id="sc-plant" value="'+SYNC_PLANT+'" style="width:100%;border:1px solid rgba(0,0,0,.13);border-radius:7px;padding:7px 9px;font-size:12px;font-family:monospace"></div>'+
      '<button onclick="applySyncConfig()" style="width:100%;padding:11px;background:linear-gradient(135deg,#185FA5,#2b7fc4);color:#fff;border:none;border-radius:9px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit">Connect &amp; Enable Sync</button>':
      '<div style="background:rgba(250,238,218,.9);border-radius:8px;padding:12px;font-size:13px;color:#854F0B">Only Process Engineer can configure sync settings.</div>'
    )+'</div>';
}

function applySyncConfig(){
  var url=document.getElementById("sc-url").value.trim();
  var key=document.getElementById("sc-key").value.trim();
  var plant=(document.getElementById("sc-plant")||{}).value||"pp-plant-1";
  if(!url){alert("Database URL is required.");return;}
  FIREBASE_CONFIG.databaseURL=url;
  FIREBASE_CONFIG.apiKey=key;
  SYNC_PLANT=plant;
  try{localStorage.setItem("gc_sync_url",url);localStorage.setItem("gc_sync_key",key);localStorage.setItem("gc_sync_plant",plant);}catch(e){}
  if(SYNC_REF)SYNC_REF.off();
  try{firebase.apps.forEach(function(a){try{a.delete();}catch(e){}});}catch(e){}
  DB=null;SYNC_REF=null;
  document.getElementById("sync-setup-modal").remove();
  initFirebase();
}

/* Load saved config */
try{
  var su=localStorage.getItem("gc_sync_url"),sk=localStorage.getItem("gc_sync_key"),sp=localStorage.getItem("gc_sync_plant");
  if(su){FIREBASE_CONFIG.databaseURL=su;}
  if(sk){FIREBASE_CONFIG.apiKey=sk;}
  if(sp){SYNC_PLANT=sp;}
}catch(e){}

initFirebase();
renderOp();

</script>
</body>
</html>
